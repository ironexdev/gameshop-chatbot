<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GameShop POC</title>
    <style>
      #diagram-thumb {
        cursor: zoom-in;
      }
      #diagram-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2147483000;
        cursor: zoom-out;
        padding: 2rem;
      }
      #diagram-modal.open {
        display: flex;
      }
      #diagram-modal img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      #diagram-modal-close {
        position: absolute;
        top: 1rem;
        right: 1.25rem;
        background: none;
        border: 0;
        color: #fff;
        font-size: 2rem;
        line-height: 1;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1 style="font-family: system-ui; padding: 2rem 2rem 0.5rem;">GameShop - ukázka</h1>
    <p style="font-family: system-ui; padding: 0 2rem; color: #555;">
      Klikni na chatovací bublinu vpravo dole.
    </p>
    <script src="/widget.js"></script>
    <script>
      Chatbot.init({ endpoint: "/chat" });
    </script>
    <figure style="margin: 1.5rem 2rem; max-width: 1200px;">
      <img
        id="diagram-thumb"
        src="/gameshop_chatbot_diagram.svg"
        alt="GameShop chatbot architecture diagram"
        style="max-width: 100%; height: auto; border: 1px solid #ddd; border-radius: 4px;"
      />
      <figcaption style="font-family: system-ui; font-size: 0.85rem; color: #888; margin-top: 0.5rem;">
        Architecture overview - see <code>docs/architecture.md</code>. Click to zoom.
      </figcaption>
    </figure>
    <div id="diagram-modal" role="dialog" aria-label="Architecture diagram">
      <button id="diagram-modal-close" type="button" aria-label="Close">&times;</button>
      <img src="/gameshop_chatbot_diagram.svg" alt="GameShop chatbot architecture diagram (full size)" />
    </div>
    <script>
      (function () {
        var thumb = document.getElementById("diagram-thumb");
        var modal = document.getElementById("diagram-modal");
        var closeBtn = document.getElementById("diagram-modal-close");
        function open() {
          modal.classList.add("open");
        }
        function close() {
          modal.classList.remove("open");
        }
        thumb.addEventListener("click", open);
        modal.addEventListener("click", close);
        closeBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          close();
        });
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") close();
        });
      })();
    </script>
  </body>
</html>
